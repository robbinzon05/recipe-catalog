{% extends 'base.html' %}

{% block title %}Редактирование комментария - Каталог рецептов{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="content-panel p-4">
            <h1 class="h3 mb-3">Редактирование комментария</h1>
            <p class="text-secondary">Рецепт: <a href="{{ comment.recipe.get_absolute_url }}">{{ comment.recipe.title }}</a></p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="{{ form.text.id_for_label }}">{{ form.text.label }}</label>
                    {{ form.text }}
                    {{ form.text.errors }}
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-success" type="submit">Сохранить</button>
                    <a class="btn btn-outline-secondary" href="{{ comment.recipe.get_absolute_url }}">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
