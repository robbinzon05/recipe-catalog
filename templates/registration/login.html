{% extends 'base.html' %}

{% block title %}Вход - Каталог рецептов{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
        <div class="content-panel p-4">
            <h1 class="h3 mb-3">Вход</h1>
            <form method="post">
                {% csrf_token %}
                {% if form.non_field_errors %}
                    <div class="alert alert-danger">
                        {{ form.non_field_errors }}
                    </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label" for="{{ form.username.id_for_label }}">Имя пользователя</label>
                    <input class="form-control" type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}" value="{{ form.username.value|default:'' }}" required autofocus>
                    {{ form.username.errors }}
                </div>

                <div class="mb-3">
                    <label class="form-label" for="{{ form.password.id_for_label }}">Пароль</label>
                    <input class="form-control" type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}" required>
                    {{ form.password.errors }}
                </div>

                <button class="btn btn-success w-100" type="submit">Войти</button>
            </form>
            <p class="text-secondary mt-3 mb-0">
                Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
